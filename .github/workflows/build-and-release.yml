name: Build and Release Flutter App

on:
  push:
    branches:
      - master
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --release --split-per-abi

      - name: Rename APK
        run: |
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            NAME="WealthFam-v${{ github.ref_name }}.apk"
          else
            NAME="WealthFam-master-build-${{ github.run_number }}.apk"
          fi
          mv build/app/outputs/flutter-apk/app-release.apk build/app/outputs/flutter-apk/$NAME
          echo "APK_NAME=$NAME" >> $GITHUB_ENV

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APK_NAME }}
          path: build/app/outputs/flutter-apk/${{ env.APK_NAME }}

      - name: Create Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: build/app/outputs/flutter-apk/${{ env.APK_NAME }}
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
